<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PCF · Poster 01 · Exit Capitalism · Letter Portrait</title>

<!--
  ============================================================================
  PLANETARY COORDINATION FRAMEWORK
  POSTER 01 — EXIT CAPITALISM · Letter portrait 8.5" × 11"
  ============================================================================

  PRINT SPECIFICATIONS
  - Dimensions: 8.5" × 11" (letter size, portrait)
  - Resolution: 300 DPI = 2550 × 3300 px final
  - Design size: 850 × 1100 px (1x for screen preview)
  - Bleed: 0.125" safety margin inside the printable area
  - Target: Epson inkjet on glossy photo paper

  DESIGN DECISIONS (vs. the feed card version)
  - Massive scale on the headline — readable from 15+ feet
  - QR code in ivory tile (dark-on-ivory is universally scannable;
    inverted QRs fail on ~20% of older phones/scanners)
  - URL huge next to QR — the URL is the whole point of the poster,
    so someone can type it later if they don't scan
  - Corner metadata stripped — feed-resolution noise disappears at wall distance
  - Verdigris pulled back slightly — glossy paper over-saturates
  - Single ivory "framework mark" at top for attribution
  - Italic Friedman reference at bottom as quiet coda

  EXPORT FOR PRINT
  - Chrome DevTools → right-click .canvas → "Capture node screenshot"
    captures at the DOM size (850×1100). With 2× device pixel ratio
    that's 1700×2200.
  - For 300 DPI letter (2550×3300), use Playwright with
    device_scale_factor=3 — see render-posters.py
  - Save as PNG, then either print directly OR convert to PDF:
    convert poster.png -density 300 -page Letter poster.pdf
  ============================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    /* Palette — slightly tuned for print.
       On glossy paper inks oversaturate, so verdigris is pulled back from
       the screen value, ivory is brightened slightly, and warm atmosphere
       is reduced to keep ink coverage under control. */
    --ground-deep:     #15110c;
    --ground-shadow:   #1f1913;
    --verdigris:       #35a890;   /* slightly muted from screen's #3ec6a8 */
    --verdigris-deep:  #2a8a75;
    --verdigris-glow:  #4fc9ae;
    --ivory:           #f2ecda;
    --ivory-warm:      #ebddbc;
    --ivory-dim:       #b8b2a5;
    --gray-cool:       #8a837a;
    --gray-dim:        #524a3f;
    --ochre:           #d9a668;
    --line-subtle:     rgba(242, 236, 218, 0.12);
    --glow-verdigris:  rgba(53, 168, 144, 0.45);

    --serif:  'Instrument Serif', 'Cormorant Garamond', Georgia, serif;
    --sans:   'Inter', -apple-system, sans-serif;
    --mono:   'JetBrains Mono', 'IBM Plex Mono', monospace;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--sans);
  }

  /* ─────────────────────────────────────────────────────────────
     THE CANVAS — letter portrait at design scale (1x).
     Playwright renders at 3x for 300 DPI print output.
     ───────────────────────────────────────────────────────────── */
  .canvas {
    width: 850px;
    height: 1100px;
    position: relative;
    overflow: hidden;
    background: var(--ground-deep);
    color: var(--ivory);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }

  /* ─── Warm atmospheric blooms, tuned for portrait aspect.
     Less lateral spread, more vertical presence. */
  .bloom {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .bloom-warm-primary {
    width: 700px;
    height: 700px;
    background: rgba(235, 221, 188, 0.28);
    filter: blur(110px);
    top: -160px;
    right: -140px;
  }
  .bloom-ochre {
    width: 520px;
    height: 520px;
    background: rgba(217, 166, 104, 0.22);
    filter: blur(100px);
    bottom: -120px;
    left: -100px;
  }
  .bloom-warm-accent {
    width: 320px;
    height: 320px;
    background: rgba(235, 221, 188, 0.14);
    filter: blur(90px);
    top: 60px;
    left: -80px;
  }
  /* Tight verdigris glow behind "Exit" */
  .bloom-verdigris-accent {
    position: absolute;
    width: 220px;
    height: 140px;
    border-radius: 50%;
    background: rgba(53, 168, 144, 0.32);
    filter: blur(60px);
    top: 26%;
    left: 12%;
    pointer-events: none;
  }

  /* ─── Spine and numeral, scaled for poster. */
  .spine {
    position: absolute;
    left: 40px;
    top: 160px;
    bottom: 180px;
    width: 2px;
    background: linear-gradient(180deg,
      transparent 0%,
      var(--verdigris) 15%,
      var(--verdigris) 85%,
      transparent 100%);
    box-shadow: 0 0 16px var(--glow-verdigris);
    opacity: 0.9;
  }

  .spine-numeral {
    position: absolute;
    left: 26px;
    top: 140px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 28px;
    color: var(--verdigris);
    letter-spacing: -0.02em;
  }

  /* ─── Hairlines for the page-like frame */
  .hairline {
    position: absolute;
    left: 60px;
    right: 60px;
    height: 1px;
    background: var(--line-subtle);
  }
  .hairline.top { top: 120px; }
  .hairline.bottom { bottom: 150px; }

  /* ─── Main content frame */
  .content {
    position: absolute;
    inset: 0;
    padding: 60px 60px 60px 85px;
    display: flex;
    flex-direction: column;
    z-index: 5;
  }

  /* ─── Header: minimal for poster. Just the framework mark, no classifications.
     At wall distance, corner metadata is noise. Keep only what reads from 15ft. */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    height: 40px;
  }

  .mark-dot {
    width: 10px;
    height: 10px;
    background: var(--verdigris);
    box-shadow: 0 0 12px var(--glow-verdigris);
    border-radius: 1px;
    transform: rotate(45deg);
  }

  .mark-name {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--ivory);
  }

  .mark-spacer {
    flex: 1;
    height: 1px;
    background: var(--line-subtle);
    margin: 0 16px;
  }

  .mark-tag {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gray-cool);
  }

  /* ─── Headline block: this is the whole poster.
     Sized to fit within the content area (canvas minus 85px left, 60px right
     = 705px working width). "capitalism." is the widest word; it sets the
     ceiling on headline size. At 165px the word fits with breathing room. */
  .headline-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 0 0 10px;
    margin-top: -10px;
  }

  .headline {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 165px;
    line-height: 0.92;
    letter-spacing: -0.028em;
    color: var(--ivory);
    margin: 0;
  }

  .headline .emphasis {
    font-style: italic;
    color: var(--verdigris);
    text-shadow:
      0 0 25px rgba(53, 168, 144, 0.45),
      0 0 60px rgba(53, 168, 144, 0.2);
  }

  .headline .period {
    color: var(--ochre);
  }

  /* Second voice scales with headline */
  .second-voice {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 34px;
    line-height: 1.25;
    color: var(--ivory);
    margin-top: 38px;
    letter-spacing: -0.015em;
  }

  .tag-line {
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    color: var(--ivory-dim);
    margin-top: 10px;
    line-height: 1.35;
  }

  /* ─────────────────────────────────────────────────────────────
     THE URL + QR BLOCK — the working part of the poster
     This is what converts a passerby into a visitor.
     Two modes of consumption: type it (URL) or scan it (QR).
     ───────────────────────────────────────────────────────────── */
  .url-block {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 44px;
    padding-top: 28px;
    border-top: 1px solid var(--line-subtle);
  }

  .url-text {
    flex: 1;
  }

  .url-prefix {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--verdigris);
    margin-bottom: 10px;
  }

  .url-main {
    font-family: var(--mono);
    font-size: 44px;
    font-weight: 600;
    color: var(--ivory);
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .url-main .tld {
    color: var(--ochre);
  }

  .qr-tile {
    width: 140px;
    height: 140px;
    background: var(--ivory);
    padding: 10px;
    border: 2px solid var(--verdigris);
    box-shadow: 0 0 18px rgba(53, 168, 144, 0.3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-tile img {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ─── Footer: minimal Friedman attribution, poster numbering */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 40px;
    height: 30px;
  }

  .attribution {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--ivory-dim);
    max-width: 500px;
    line-height: 1.4;
  }

  .poster-mark {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gray-cool);
    text-align: right;
  }

  /* ─── Grain overlay */
  .noise {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    z-index: 10;
    mix-blend-mode: overlay;
  }
</style>
</head>

<body>

<div class="canvas">

  <div class="bloom bloom-warm-primary"></div>
  <div class="bloom bloom-ochre"></div>
  <div class="bloom bloom-warm-accent"></div>
  <div class="bloom-verdigris-accent"></div>

  <div class="spine"></div>
  <div class="spine-numeral">01</div>

  <div class="hairline top"></div>
  <div class="hairline bottom"></div>

  <div class="content">

    <!-- Minimal header: framework mark + series tag -->
    <div class="header">
      <div class="mark-dot"></div>
      <div class="mark-name">Planetary Coordination Framework</div>
      <div class="mark-spacer"></div>
      <div class="mark-tag">Poster · 01</div>
    </div>

    <!-- The hero. At print scale this is massive. -->
    <div class="headline-block">
      <h1 class="headline">
        <span class="emphasis">Exit</span><br>
        capitalism<span class="period">.</span>
      </h1>
      <div class="second-voice">
        The plan is open source.
      </div>
      <div class="tag-line">
        Ideas lying around, for when the crisis comes.
      </div>

      <!-- URL + QR block — the working part of the poster -->
      <div class="url-block">
        <div class="url-text">
          <div class="url-prefix">Read it · fork it · build it</div>
          <div class="url-main">exitcapitalism<span class="tld">.link</span></div>
        </div>
        <div class="qr-tile">
          <img src="qr-exitcapitalism.png" alt="QR code linking to exitcapitalism.link">
        </div>
      </div>
    </div>

    <!-- Footer: quiet Friedman reference + poster metadata -->
    <div class="footer">
      <div class="attribution">
        "The actions that are taken depend on the ideas that are lying around." — Friedman, 1982
      </div>
      <div class="poster-mark">
        CC0 · 2026<br>
        Edition 1
      </div>
    </div>

  </div>

  <div class="noise"></div>

</div>

</body>
</html>
